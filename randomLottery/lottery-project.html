<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Your Lucky Numbers</title>
    <link rel="stylesheet" href="lottery-project.css">
      
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
    
    
    
  <body>
	
      
      <main>
          <section id="imgArea">
            <img id="lottoImg" src="CALottLogo.svg.png">
          </section>
                      

        <section id="titleArea">
            <h1>Let us find your Lucky Number!</h1>
            <p>**This is set for Mega Millions play.. 1-70 for first 5 numbers, 1-25 for last ball.**</p>
            
        </section>
          
          
        <section id="numbersArea">
            <div id="ballOne" class="allBalls">?</div>
            <div id="ballTwo" class="allBalls">?</div>
            <div id="ballThree" class="allBalls">?</div>
            <div id="ballFour" class="allBalls">?</div>
            <div id="ballFive" class="allBalls">?</div>
            <div id="ballSix" class="allBalls">?</div>
        </section>
        
          <section id="btnArea">
            <p>Click the button below to choose a new set of numbers. Pick as many sets as you'd like.  </p>
              <div id="btn">Get my numbers!</div>
          </section>
        
      </main>
      
     
      <script src="lottery-project.js"></script>
  </body>
</html>
